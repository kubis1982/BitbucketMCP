services:
  bitbucket-http:
    build:
      context: .
      dockerfile: http/Dockerfile
    container_name: bitbucket-mcp-http
    ports:
      - "8080:8080"
    environment:
      # ASP.NET Core Configuration
      ASPNETCORE_URLS: "http://+:8080"
      
      # For app_password authentication:
      BITBUCKET_USERNAME: ""
      BITBUCKET_APP_PASSWORD: ""
      BITBUCKET_WORKSPACE: ""
      
      # Optional: Logging level (Trace, Debug, Information, Warning, Error)
      # ASPNETCORE_LOGGING__LOGLEVEL__DEFAULT: "Information"
    
    restart: unless-stopped

  bitbucket-stdio:
      build:
        context: .
        dockerfile: stdio/Dockerfile
      container_name: bitbucket-mcp-stdio
      environment:      
        # For app_password authentication:
        BITBUCKET_USERNAME: ""
        BITBUCKET_APP_PASSWORD: ""
        BITBUCKET_WORKSPACE: ""
      
        # Optional: Logging level (Trace, Debug, Information, Warning, Error)
        # ASPNETCORE_LOGGING__LOGLEVEL__DEFAULT: "Information"
    
      restart: unless-stopped
