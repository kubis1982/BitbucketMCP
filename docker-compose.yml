services:
  bitbucket-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitbucket-mcp-server
    environment:
      # Authentication type: app_password or oauth_token
      BITBUCKET_AUTH_TYPE: "app_password"
      
      # For app_password authentication:
      BITBUCKET_USERNAME: "m.swiatnicki@7technology.pl"
      BITBUCKET_APP_PASSWORD: "ATATT3xFfGF0EgtCz1A29l6d-7kJHbiGKZq0bldW5Toz94DzR-C8IXY_heQ79lX3pvNzXPizuGnj792WD1zzXBh4wvsybg8VSPVDTlDtnvxLWoBOQTfQXXFx8wU5vR4xf_kDLyhGNb3ivgh0YwikDmdTxXVMcEtDAXqoWZkZSUvjzQppy4zmbgU=24260A73"
      
      # For oauth_token authentication (comment out app_password vars if using this):
      # BITBUCKET_TOKEN: "your-oauth-token"
      
      # Optional: Default workspace
      BITBUCKET_WORKSPACE: "7t-dev"
      
      # Optional: Logging level (Trace, Debug, Information, Warning, Error)
      # LOG_LEVEL: "Information"
    
    # MCP uses stdio, so we need interactive mode
    stdin_open: true
    tty: true
    
    restart: unless-stopped

